{% extends "base.html" %} {% block content %}
<div class="container-fluid">
    <div class="row">
        <!-- Left Column -->
        <div class="col-md-6">
            <div class="d-flex flex-column h-100">
                <!-- Status Card -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Status</h5>
                    </div>
                    <div class="card-body">
                        <p>
                            <strong>Agent State:</strong>
                            <span id="agent-state">--</span>
                        </p>
                        <p>
                            <strong>Last Update:</strong>
                            <span id="last-update">--</span>
                        </p>
                    </div>
                </div>
                <!-- Task Card -->
                <div class="card flex-grow-1">
                    <div class="card-header">
                        <h5>Task</h5>
                    </div>
                    <div class="card-body card-body-scroll">
                        <p id="task-description">No active task.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header">
                    <h5>Plan</h5>
                </div>
                <div class="card-body card-body-scroll">
                    <ul id="plan-steps" class="list-group list-group-flush">
                        <li class="list-group-item">No plan available.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
